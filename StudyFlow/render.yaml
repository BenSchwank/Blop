services:
  - type: web
    name: blop-study-backend
    env: python
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    # Render setzt PORT; feste Portnummer führt oft zu 502, wenn Proxy und App nicht übereinstimmen.
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: GOOGLE_API_KEY
        sync: false
      - key: FIREBASE_CREDENTIALS
        sync: false
      # E-Mail „Dokument fertig“: Empfänger = users.email pro Account (DB). Hier nur der SMTP-Versand:
      - key: BLOP_SMTP_PORT
        value: "587"
      - key: BLOP_SMTP_HOST
        sync: false
      - key: BLOP_SMTP_USER
        sync: false
      - key: BLOP_SMTP_PASSWORD
        sync: false
      - key: BLOP_SMTP_FROM
        sync: false
      - key: BLOP_APP_PUBLIC_URL
        sync: false

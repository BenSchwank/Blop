name: Windows Build & Release

on:
  push:
    branches: [ "master" ]
    tags:
      - 'v*'

jobs:
  build:
    name: Build & Deploy
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Qt via aqtinstall
        shell: pwsh
        run: |
          pip install aqtinstall

          # Definiere das Zielverzeichnis explizit
          $qtDir = "${{ runner.workspace }}\Qt"

          # Installiere Qt 6.10.2 direkt in dieses Verzeichnis
          # WICHTIG: --outputdir $qtDir sorgt dafür, dass die Pfade stimmen
          aqt install-qt windows desktop 6.10.2 win64_msvc2022_64 -m qtwebengine qtwebchannel qtpositioning qtmultimedia qtnetworkauth --outputdir $qtDir

          # Setze den Pfad zur Installation
          $qtBase = "$qtDir\6.10.2\msvc2022_64"

          # Überprüfung: Existiert qmake?
          if (-not (Test-Path "$qtBase\bin\qmake.exe")) {
            Write-Error "Qt Installation fehlgeschlagen! Pfad nicht gefunden: $qtBase"
            exit 1
          }

          echo "Qt erfolgreich installiert in: $qtBase"

          # Environment Variables für CMake setzen
          echo "QT_ROOT=$qtBase" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "$qtBase\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Create Build Directory
        run: mkdir build

      - name: Configure CMake
        working-directory: build
        # CMAKE_PREFIX_PATH zeigt jetzt auf den validierten Qt-Ordner
        run: cmake .. -G "NMake Makefiles" -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="${{ env.QT_ROOT }}"

      - name: Build
        working-directory: build
        run: nmake

      - name: Prepare Deployment
        run: |
          mkdir deployment
          copy build\Blop.exe deployment\Blop.exe

      # windeployqt muss ebenfalls den korrekten Pfad nutzen (ist aber durch PATH bereits verfügbar)
      # Kein --no-opengl-sw: SW-OpenGL-Fallback fehlt sonst und WebEngine kann schwarz bleiben.
      - name: Run windeployqt
        shell: cmd
        run: |
          windeployqt --dir deployment deployment\Blop.exe --release --compiler-runtime --no-translations

      - name: Fallback copy critical WebEngine runtime files
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $qt = "${{ env.QT_ROOT }}"

          if (!(Test-Path "deployment\QtWebEngineProcess.exe")) {
            Copy-Item "$qt\bin\QtWebEngineProcess.exe" "deployment\QtWebEngineProcess.exe" -Force
          }

          if (!(Test-Path "deployment\resources")) {
            New-Item -ItemType Directory -Path "deployment\resources" | Out-Null
          }
          if (!(Test-Path "deployment\resources\icudtl.dat")) {
            Copy-Item "$qt\resources\icudtl.dat" "deployment\resources\icudtl.dat" -Force
          }
          $qtPaks = Get-ChildItem "$qt\resources" -Filter "qtwebengine_resources*.pak" -File -ErrorAction SilentlyContinue
          if ($qtPaks.Count -gt 0) {
            Copy-Item "$qt\resources\qtwebengine_resources*.pak" "deployment\resources\" -Force
          }

          if (!(Test-Path "deployment\qtwebengine_locales")) {
            Copy-Item "$qt\translations\qtwebengine_locales" "deployment\qtwebengine_locales" -Recurse -Force
          }

      - name: Check WebEngine Deployment
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          if (!(Test-Path "deployment\Qt6WebEngineCore.dll")) { throw "CRITICAL: Qt6WebEngineCore.dll missing!" }
          if (!(Test-Path "deployment\QtWebEngineProcess.exe")) { throw "CRITICAL: QtWebEngineProcess.exe missing!" }
          if (!(Test-Path "deployment\resources")) { throw "CRITICAL: resources folder missing!" }

          if (!(Test-Path "deployment\resources\icudtl.dat")) {
            throw "CRITICAL: deployment\resources\icudtl.dat missing!"
          }

          $pakCount = (Get-ChildItem "deployment\resources" -Filter "qtwebengine_resources*.pak" -File -ErrorAction SilentlyContinue | Measure-Object).Count
          if ($pakCount -lt 1) {
            throw "CRITICAL: no qtwebengine_resources*.pak found in deployment\resources!"
          }

          if (!(Test-Path "deployment\qtwebengine_locales")) {
            throw "CRITICAL: qtwebengine_locales folder missing (WebEngine text/resources may fail)!"
          }
          $localePakCount = (Get-ChildItem "deployment\qtwebengine_locales" -Filter "*.pak" -File -ErrorAction SilentlyContinue | Measure-Object).Count
          if ($localePakCount -lt 1) {
            throw "CRITICAL: qtwebengine_locales exists but contains no .pak files!"
          }

          if (!(Test-Path "deployment\opengl32sw.dll")) { Write-Warning "opengl32sw.dll missing; software GL fallback unavailable on some GPUs." }

      - name: Zip Release
        uses: TheDoctor0/zip-release@0.7.1
        with:
          type: 'zip'
          filename: 'Blop_Windows.zip'
          directory: 'deployment'

      - name: Install NSIS and Build Installer
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $retryCount = 0
          $success = $false
          while (-not $success -and $retryCount -lt 5) {
            Write-Host "Installing NSIS (Attempt $($retryCount + 1))..."
            $proc = Start-Process choco -ArgumentList "install", "nsis", "-y", "--no-progress" -Wait -PassThru
            if ($proc.ExitCode -eq 0) {
              $success = $true
            } else {
              Write-Host "Chocolatey failed. Retrying in 15 seconds..."
              Start-Sleep -Seconds 15
              $retryCount++
            }
          }
          if (-not $success) {
            Write-Error "Failed to install NSIS after 5 attempts."
            exit 1
          }

          $nsisCandidates = @(
            "C:\Program Files (x86)\NSIS\makensis.exe",
            "C:\Program Files\NSIS\makensis.exe",
            "C:\ProgramData\chocolatey\bin\makensis.exe",
            "C:\ProgramData\chocolatey\lib\nsis\tools\makensis.exe"
          )

          $nsisPath = $null
          foreach ($candidate in $nsisCandidates) {
            if (Test-Path $candidate) {
              $nsisPath = $candidate
              break
            }
          }

          if (-not $nsisPath) {
            $cmd = Get-Command makensis -ErrorAction SilentlyContinue
            if ($cmd -and (Test-Path $cmd.Source)) {
              $nsisPath = $cmd.Source
            }
          }

          if (-not $nsisPath) {
            Write-Host "NSIS debug: installed packages"
            choco list --local-only | Select-String -Pattern "nsis" -CaseSensitive:$false | ForEach-Object { $_.Line }
            Write-Host "NSIS debug: searching common install roots"
            Get-ChildItem "C:\ProgramData\chocolatey" -Recurse -Filter "makensis.exe" -ErrorAction SilentlyContinue |
              Select-Object -ExpandProperty FullName
            Write-Error "NSIS makensis.exe not found after installation!"
            exit 1
          }
          Write-Host "Using NSIS at: $nsisPath"
          & $nsisPath installer.nsi

      - name: Upload Versioned Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          files: |
            deployment/Blop_Windows.zip
            Blop_Windows_Installer.exe
          draft: false
          prerelease: false
          repository: BenSchwank/Blop-releases

      - name: Upload Nightly Release
        if: github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v1
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          tag_name: nightly
          name: Nightly Build (Latest)
          body: "Neuester automatischer Build mit WebEngine und Installer."
          files: |
            deployment/Blop_Windows.zip
            Blop_Windows_Installer.exe
          draft: false
          prerelease: true
          overwrite: true
          repository: BenSchwank/Blop-releases


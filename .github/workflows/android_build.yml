name: Android Build & Publish to Public Repo

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Android Build
    runs-on: ubuntu-latest
    # Maven Central liefert auf GHA manchmal 403 (IPv6/Bot-Filter); IPv4 + explizite Gradle-Config mildert das.
    env:
      JAVA_TOOL_OPTIONS: -Djava.net.preferIPv4Stack=true
      # Sentry secrets exposed at job-level so steps can use env.* in `if:` conditions
      # (secrets.* is not allowed in conditionals; this is the documented workaround).
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
      SENTRY_URL: ${{ secrets.SENTRY_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # 1. Nur wirklich instabile SDKs entfernen — API 35 wird für targetSdk/compileSdk benötigt (Play Console).
      - name: Remove unstable Android SDKs
        run: |
          echo "Removing unstable Android SDKs (keep API 35)..."
          sudo rm -rf /usr/local/lib/android/sdk/platforms/android-36*
          sudo rm -rf /usr/local/lib/android/sdk/build-tools/36*

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Ninja
        run: sudo apt-get install -y ninja-build

      - name: Build mbedTLS + static libcurl for Android (Sentry HTTP transport)
        env:
          WORKDIR: ${{ runner.temp }}/curl-mbedtls-src
        run: |
          set -euo pipefail
          NDK="${ANDROID_NDK_ROOT:-${ANDROID_NDK_HOME:-}}"
          if [[ -z "${NDK}" || ! -d "${NDK}" ]]; then
            SDK="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
            if [[ -n "${SDK}" ]]; then
              PIN="${SDK}/ndk/25.1.8937393"
              if [[ -d "${PIN}" ]]; then
                NDK="${PIN}"
              else
                NDK="$(ls -d "${SDK}/ndk/"* 2>/dev/null | sort -V | tail -n1)"
              fi
            fi
          fi
          if [[ -z "${NDK}" || ! -d "${NDK}" ]]; then
            echo "Could not locate Android NDK (set ANDROID_NDK_ROOT)." >&2
            exit 1
          fi
          echo "Using NDK ${NDK}"
          # Only build the ABIs that the Qt Android install actually ships. Currently
          # aqt installs android_arm64_v8a only (see 'Install Qt via aqtinstall' step).
          # Building x86/armeabi-v7a here is wasted CI time and exposes us to mbedTLS
          # x86 -mpclmul/-msse2/-maes build errors (MBEDTLS_AESNI_C). Add ABIs here as
          # the Qt install list grows.
          chmod +x "${GITHUB_WORKSPACE}/scripts/ci/build_android_curl_mbedtls.sh"
          bash "${GITHUB_WORKSPACE}/scripts/ci/build_android_curl_mbedtls.sh" \
            "${NDK}" "34" "${GITHUB_WORKSPACE}/.deps/curlmbed" \
            arm64-v8a

      - name: Install Qt via aqtinstall
        run: |
          pip install --upgrade pip
          # v3.18.33: Pin aqtinstall to avoid Qt 6.10.2 archive extraction bugs in 3.3.0.
          pip install aqtinstall==3.2.1
          mkdir -p ${{ runner.workspace }}/Qt
          # Desktop Qt für Host-Tools (must match android major.minor for qt-cmake).
          # Qt 6.10+: aqt arch is linux_gcc_64 (gcc_64 breaks Updates.xml / qt_base).
          python -m aqt install-qt linux desktop 6.10.2 linux_gcc_64 -O ${{ runner.workspace }}/Qt -m qtnetworkauth
          # Android Qt + qtwebview / qtmultimedia (embedded Study WebView)
          python -m aqt install-qt linux android 6.10.2 android_arm64_v8a -O ${{ runner.workspace }}/Qt -m qtwebview qtmultimedia qtnetworkauth

      - name: Clone android_openssl (TLS libs for Android)
        run: |
          git clone --depth 1 https://github.com/KDAB/android_openssl.git ${{ runner.workspace }}/android_openssl
          ls -la ${{ runner.workspace }}/android_openssl/ssl_3/arm64-v8a/

      - name: Create Build Directory
        run: mkdir build

      # 2. CMake Konfiguration
      - name: Configure CMake
        working-directory: build
        env:
          QT_HOST_PATH: ${{ runner.workspace }}/Qt/6.10.2/gcc_64
          QT_ANDROID_PATH: ${{ runner.workspace }}/Qt/6.10.2/android_arm64_v8a
        run: |
          # qt-cmake: all -D/-G must come BEFORE the source dir .., or QT_HOST_PATH never enters the cache.
          "$QT_ANDROID_PATH/bin/qt-cmake" \
            -G Ninja \
            -DQT_HOST_PATH="${{ runner.workspace }}/Qt/6.10.2/gcc_64" \
            -DQT_HOST_PATH_CMAKE_DIR="${{ runner.workspace }}/Qt/6.10.2/gcc_64/lib/cmake" \
            -DQT_ANDROID_BUILD_ALL_ABIS=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DANDROID_PLATFORM=android-34 \
            -DANDROID_SDK_ROOT=$ANDROID_SDK_ROOT \
            -DANDROID_NDK_ROOT=$ANDROID_NDK_ROOT \
            -DANDROID_VERSION_CODE=${{ github.run_number }} \
            -DBLOP_OVERRIDE_GIT_SHA="${{ github.sha }}" \
            -DBLOP_OBS_BUILD_NUMBER="${{ github.run_number }}" \
            -DBLOP_OBS_BUILD_FLAVOR=ci_release \
            -DBLOP_ENABLE_SENTRY=ON \
            -DBLOP_ANDROID_CURL_INSTALL_ROOT="${GITHUB_WORKSPACE}/.deps/curlmbed" \
            -DANDROID_OPENSSL_ROOT="${{ runner.workspace }}/android_openssl" \
            ..

      # Qt/androiddeployqt erzeugt ein Gradle-Projekt. Ohne diese Einstellungen schlagen
      # Downloads von repo.maven.apache.org mit 403 fehl (bekanntes GHA-/IPv6-Thema).
      - name: Configure Gradle for Maven (CI)
        run: |
          mkdir -p ~/.gradle
          cat > ~/.gradle/gradle.properties << 'EOF'
          org.gradle.jvmargs=-Djava.net.preferIPv4Stack=true -Xmx2048m -XX:MaxMetaspaceSize=512m
          systemProp.java.net.preferIPv4Stack=true
          systemProp.http.connectionTimeout=120000
          systemProp.http.socketTimeout=120000
          systemProp.org.gradle.internal.http.userAgent=Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36
          EOF
          cat > ~/.gradle/init.gradle << 'EOF'
          // Zusätzliche Repos (repo1 = gleicher Inhalt, oft andere CDN-Route als repo.maven.apache.org)
          gradle.beforeProject { p ->
              p.buildscript.repositories {
                  maven { url 'https://repo1.maven.org/maven2' }
                  google()
                  mavenCentral()
              }
              p.repositories {
                  maven { url 'https://repo1.maven.org/maven2' }
                  google()
                  mavenCentral()
              }
          }
          EOF

      - name: Normalize Android package name in deployment settings
        working-directory: build
        run: |
          # Some qt-cmake/androiddeployqt runs may emit the literal token
          # "localAndroidPackageName" into deployment settings.
          # Ensure androiddeployqt always gets the real Java package id.
          test -f android-Blop-deployment-settings.json
          sed -i 's/localAndroidPackageName/com.benschwank.blop/g' android-Blop-deployment-settings.json
          rg -n "localAndroidPackageName|com\\.benschwank\\.blop" android-Blop-deployment-settings.json || true

      - name: Build APK
        working-directory: build
        run: cmake --build . --target Blop_make_apk

      - name: Debug android package wiring (on failure)
        if: failure()
        run: |
          # Guard against early failures (e.g. mbedTLS/curl step before build/ exists).
          if [ ! -d build ]; then
            echo "build/ does not exist - failure occurred before CMake configure; nothing to diagnose."
            exit 0
          fi
          cd build
          echo "----- deployment settings -----"
          rg -n "localAndroidPackageName|androidPackageName|com\\.benschwank\\.blop" android-Blop-deployment-settings.json || true
          echo "----- generated gradle.properties -----"
          rg -n "androidPackageName|localAndroidPackageName|com\\.benschwank\\.blop" android-build/gradle.properties || true
          echo "----- generated android build.gradle -----"
          rg -n "localAndroidPackageName|androidPackageName|namespace|applicationId|com\\.benschwank\\.blop" android-build/build.gradle || true
          echo "----- generated AndroidManifest.xml -----"
          rg -n "manifest|package=|localAndroidPackageName|com\\.benschwank\\.blop" android-build/AndroidManifest.xml || true

      # Play Store verlangt ein Android App Bundle (.aab). Qt erzeugt es parallel zur APK (Target Blop_make_aab).
      # Lokal nach qt-cmake: cmake --build <build-dir> --target Blop_make_aab — .aab unter .../outputs/bundle/release/
      - name: Build Android App Bundle (AAB)
        working-directory: build
        run: cmake --build . --target Blop_make_aab

      # Optional native debug uploads for Sentry (sentry-native). Secrets: SENTRY_AUTH_TOKEN,
      # SENTRY_ORG, SENTRY_PROJECT — optional self-host: SENTRY_URL.
      # Release tag must match BLOP_SENTRY_RELEASE_STR in CMake (adr). Strict CI: drop continue-on-error below.
      - name: Upload Android native debug artifacts to Sentry (optional)
        if: env.SENTRY_AUTH_TOKEN != '' && env.SENTRY_ORG != '' && env.SENTRY_PROJECT != ''
        continue-on-error: true
        run: |
          set -euo pipefail
          curl -sL https://sentry.io/get-cli/ | bash
          RELEASE="$(git describe --tags --always)+${GITHUB_SHA}+build${GITHUB_RUN_NUMBER}"
          mapfile -t native_libs < <(find "${GITHUB_WORKSPACE}/build" -type f -name 'libBlop.so' -print)
          if ((${#native_libs[@]} == 0)); then
            echo "No libBlop.so under build/ — listing .so for diagnostics"
            find "${GITHUB_WORKSPACE}/build" -type f -name '*.so' | head -n 50 || true
            exit 1
          fi
          printf 'Uploading (%d) libs for release %s:\n' "${#native_libs[@]}" "${RELEASE}"
          printf ' - %s\n' "${native_libs[@]}"
          sentry-cli debug-files upload \
            --include-sources \
            --release "${RELEASE}" \
            --org "${SENTRY_ORG}" \
            --project "${SENTRY_PROJECT}" \
            "${native_libs[@]}"

      # 3. Signieren (rekursiv alle *.apk und *.aab unter android-build; Ausgabe *-signed.apk / *-signed.aab)
      - name: Sign release APK and AAB
        id: sign_app
        uses: ilharp/sign-android-release@v1
        with:
          releaseDir: build/android-build
          signingKey: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          keyAlias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          buildToolsVersion: 34.0.0

      # 4. Upload — nur ein APK + ein Play-Bundle, eindeutige Zielnamen (kein Duplikat-Asset auf GitHub).
      - name: Stage release artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          mkdir -p release-staging
          apk=$(find build/android-build -name 'Blop-signed.apk' -print -quit)
          if [[ -z "$apk" ]]; then echo 'Blop-signed.apk not found under build/android-build'; exit 1; fi
          cp "$apk" release-staging/Blop-signed.apk
          aab=$(find build/android-build -name 'android-build-release-signed.aab' -print -quit)
          if [[ -z "$aab" ]]; then echo 'android-build-release-signed.aab not found under build/android-build'; exit 1; fi
          cp "$aab" release-staging/blop.aab
          ls -la release-staging/

      - name: Release to Public Repo
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release-staging/Blop-signed.apk
            release-staging/blop.aab
          repository: BenSchwank/Blop-releases
          token: ${{ secrets.RELEASE_TOKEN }}

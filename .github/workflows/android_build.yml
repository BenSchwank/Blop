name: Android Build & Publish to Public Repo

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Android Build
    runs-on: ubuntu-latest
    # Maven Central liefert auf GHA manchmal 403 (IPv6/Bot-Filter); IPv4 + explizite Gradle-Config mildert das.
    env:
      JAVA_TOOL_OPTIONS: -Djava.net.preferIPv4Stack=true

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # 1. Nur wirklich instabile SDKs entfernen — API 35 wird für targetSdk/compileSdk benötigt (Play Console).
      - name: Remove unstable Android SDKs
        run: |
          echo "Removing unstable Android SDKs (keep API 35)..."
          sudo rm -rf /usr/local/lib/android/sdk/platforms/android-36*
          sudo rm -rf /usr/local/lib/android/sdk/build-tools/36*

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Ninja
        run: sudo apt-get install -y ninja-build

      - name: Install Qt via aqtinstall
        run: |
          pip install --upgrade pip
          pip install --upgrade aqtinstall
          mkdir -p ${{ runner.workspace }}/Qt
          # Desktop Qt für Host-Tools (must match android major.minor for qt-cmake)
          python -m aqt install-qt linux desktop 6.10.2 gcc_64 -O ${{ runner.workspace }}/Qt -m qtnetworkauth
          # Android Qt + qtwebview / qtmultimedia (embedded Study WebView)
          python -m aqt install-qt linux android 6.10.2 android_arm64_v8a -O ${{ runner.workspace }}/Qt -m qtwebview qtmultimedia qtnetworkauth

      - name: Create Build Directory
        run: mkdir build

      # 2. CMake Konfiguration
      - name: Configure CMake
        working-directory: build
        run: |
          export QT_HOST_PATH=${{ runner.workspace }}/Qt/6.10.2/gcc_64
          export QT_ANDROID_PATH=${{ runner.workspace }}/Qt/6.10.2/android_arm64_v8a
          ${QT_ANDROID_PATH}/bin/qt-cmake .. -G "Ninja" \
            -DQT_ANDROID_BUILD_ALL_ABIS=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DANDROID_PLATFORM=android-34 \
            -DANDROID_SDK_ROOT=$ANDROID_SDK_ROOT \
            -DANDROID_NDK_ROOT=$ANDROID_NDK_ROOT \
            -DQT_HOST_PATH=$QT_HOST_PATH \
            -DANDROID_VERSION_CODE=${{ github.run_number }}

      # Qt/androiddeployqt erzeugt ein Gradle-Projekt. Ohne diese Einstellungen schlagen
      # Downloads von repo.maven.apache.org mit 403 fehl (bekanntes GHA-/IPv6-Thema).
      - name: Configure Gradle for Maven (CI)
        run: |
          mkdir -p ~/.gradle
          cat > ~/.gradle/gradle.properties << 'EOF'
          org.gradle.jvmargs=-Djava.net.preferIPv4Stack=true -Xmx2048m -XX:MaxMetaspaceSize=512m
          systemProp.java.net.preferIPv4Stack=true
          systemProp.http.connectionTimeout=120000
          systemProp.http.socketTimeout=120000
          systemProp.org.gradle.internal.http.userAgent=Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36
          EOF
          cat > ~/.gradle/init.gradle << 'EOF'
          // Zusätzliche Repos (repo1 = gleicher Inhalt, oft andere CDN-Route als repo.maven.apache.org)
          gradle.beforeProject { p ->
              p.buildscript.repositories {
                  maven { url 'https://repo1.maven.org/maven2' }
                  google()
                  mavenCentral()
              }
              p.repositories {
                  maven { url 'https://repo1.maven.org/maven2' }
                  google()
                  mavenCentral()
              }
          }
          EOF

      - name: Build APK
        working-directory: build
        run: cmake --build . --target Blop_make_apk

      # Play Store verlangt ein Android App Bundle (.aab). Qt erzeugt es parallel zur APK (Target Blop_make_aab).
      # Lokal nach qt-cmake: cmake --build <build-dir> --target Blop_make_aab — .aab unter .../outputs/bundle/release/
      - name: Build Android App Bundle (AAB)
        working-directory: build
        run: cmake --build . --target Blop_make_aab

      # 3. Signieren (rekursiv alle *.apk und *.aab unter android-build; Ausgabe *-signed.apk / *-signed.aab)
      - name: Sign release APK and AAB
        id: sign_app
        uses: ilharp/sign-android-release@v1
        with:
          releaseDir: build/android-build
          signingKey: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          keyAlias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          buildToolsVersion: 34.0.0

      # 4. Upload — nur ein APK + ein Play-Bundle, eindeutige Zielnamen (kein Duplikat-Asset auf GitHub).
      - name: Stage release artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          mkdir -p release-staging
          apk=$(find build/android-build -name 'Blop-signed.apk' -print -quit)
          if [[ -z "$apk" ]]; then echo 'Blop-signed.apk not found under build/android-build'; exit 1; fi
          cp "$apk" release-staging/Blop-signed.apk
          aab=$(find build/android-build -name 'android-build-release-signed.aab' -print -quit)
          if [[ -z "$aab" ]]; then echo 'android-build-release-signed.aab not found under build/android-build'; exit 1; fi
          cp "$aab" release-staging/blop.aab
          ls -la release-staging/

      - name: Release to Public Repo
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release-staging/Blop-signed.apk
            release-staging/blop.aab
          repository: BenSchwank/Blop-releases
          token: ${{ secrets.RELEASE_TOKEN }}

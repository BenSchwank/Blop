services:
  - type: web
    name: blop-study-backend
    env: python
    plan: free
    rootDir: StudyFlow/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: GOOGLE_API_KEY
        sync: false
      - key: FIREBASE_CREDENTIALS
        sync: false

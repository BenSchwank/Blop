# Free-Tier: Service schläft bei Inaktivität ein → optional UptimeRobot auf GET/HEAD /api/health (siehe StudyFlow/backend/UPTIMEROBOT.md).
services:
  - type: web
    name: blop-study-backend
    runtime: docker
    plan: free
    dockerfilePath: ./StudyFlow/backend/Dockerfile
    dockerContext: ./StudyFlow/backend
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: FIREBASE_CREDENTIALS
        sync: false
      - key: OPENAI_API_KEY
        sync: false
